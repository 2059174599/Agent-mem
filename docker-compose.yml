# version: '3.8'

services:
  # Redis服务 (仅在DOCKER_INCLUDE_ES_REDIS=true时启动)
  redis:
    image: redis:7-alpine
    container_name: agent-mem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-redis

  # Elasticsearch服务 (仅在DOCKER_INCLUDE_ES_REDIS=true时启动)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: agent-mem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - with-es

  # 应用服务
  app:
    build: .
    container_name: agent-mem-app
    ports:
      - "8000:8000"
    environment:
      # 应用配置
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=false
      
      # Redis配置 - 根据部署模式选择连接方式
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      
      # ES配置 - 根据部署模式选择连接方式
      - ES_HOST=${ES_HOST:-http://elasticsearch:9200}
      - ES_USERNAME=${ES_USERNAME:-}
      - ES_PASSWORD=${ES_PASSWORD:-}
      - ES_CHAT_INDEX=${ES_CHAT_INDEX:-aigc_user_dialogs}
      
      # LLM配置
      - LLM_BASE_URL=${LLM_BASE_URL:-http://aigc-api.aigc.paas.corp/v1/chat/completions}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_MODEL=${LLM_MODEL:-gpt-5}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - LLM_RETRY_COUNT=${LLM_RETRY_COUNT:-3}
      
      # Embedding配置
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://aigc-api.aigc.paas.test/v1/embeddings}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-your-embedding-api-key-here}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-m3}
      - EMBEDDING_TIMEOUT=${EMBEDDING_TIMEOUT:-30}
      - BGE_M3_DIMS=${BGE_M3_DIMS:-1024}
      
      # 搜索配置
      - SEARCH_MAX_RESULTS=${SEARCH_MAX_RESULTS:-50}
      - SEARCH_FACT_COUNT_THRESHOLD=${SEARCH_FACT_COUNT_THRESHOLD:-50}
      - SEARCH_RECENT_CHATS_LIMIT=${SEARCH_RECENT_CHATS_LIMIT:-20}
      
      # 质量检测配置
      - QUALITY_CHECK_ENABLED=${QUALITY_CHECK_ENABLED:-true}
      - QUALITY_CHECK_MIN_LENGTH=${QUALITY_CHECK_MIN_LENGTH:-10}
      - QUALITY_CHECK_MAX_REPETITION=${QUALITY_CHECK_MAX_REPETITION:-0.3}
      - QUALITY_CHECK_MAX_INTERJECTION=${QUALITY_CHECK_MAX_INTERJECTION:-0.7}
      - QUALITY_CHECK_MIN_RELEVANCE=${QUALITY_CHECK_MIN_RELEVANCE:-0.3}
      - QUALITY_CHECK_MIN_LLM_SCORE=${QUALITY_CHECK_MIN_LLM_SCORE:-0.3}
      
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  es_data: