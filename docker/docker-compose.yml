version: '3.8'

services:
  # Redis服务 (可选，用于完整环境)
  redis:
    image: redis:7-alpine
    container_name: agent-mem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - with-redis

  # Elasticsearch服务 (可选，用于完整环境)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: agent-mem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - with-es

  # 应用服务 - 默认启动，支持连接外部Redis和ES
  app:
    build: 
      context: .
      dockerfile: Dockerfile
      tags:
        - agent-mem:${DOCKER_TAG:-latest}
    image: agent-mem:${DOCKER_TAG:-latest}
    container_name: agent-mem-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 支持Mac/Windows的host.docker.internal

volumes:
  redis_data:
  es_data: